{% extends "base.html" %}

{% block title %}分类管理 - ERP系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">分类管理</h1>
    <a href="{{ url_for('inventory.add_category') }}" class="btn btn-sm btn-primary">
        <i class="bi bi-plus"></i> 添加分类
    </a>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>分类名称</th>
                <th>描述</th>
                <th>产品数量</th>
            </tr>
        </thead>
        <tbody>
            {% for c in categories %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.name }}</td>
                <td>{{ c.description or '-' }}</td>
                <td>{{ c.products.count() }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
