{% extends "base.html" %}

{% block title %}仓库管理 - ERP系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">仓库管理</h1>
    <a href="{{ url_for('inventory.add_warehouse') }}" class="btn btn-sm btn-primary">
        <i class="bi bi-plus"></i> 添加仓库
    </a>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>仓库名称</th>
                <th>位置</th>
                <th>容量</th>
                <th>库存品种</th>
            </tr>
        </thead>
        <tbody>
            {% for w in warehouses %}
            <tr>
                <td>{{ w.id }}</td>
                <td>{{ w.name }}</td>
                <td>{{ w.location or '-' }}</td>
                <td>{{ w.capacity }}</td>
                <td>{{ w.stocks.count() }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
