{% extends "base.html" %}

{% block title %}报表中心 - ERP系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">报表中心</h1>
</div>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-box display-4 text-primary"></i>
                <h5 class="mt-3">库存报表</h5>
                <p class="text-muted">查看库存数量、价值统计</p>
                <a href="{{ url_for('report.inventory') }}" class="btn btn-outline-primary">查看报表</a>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-cart-dash display-4 text-success"></i>
                <h5 class="mt-3">销售报表</h5>
                <p class="text-muted">销售额、客户排名统计</p>
                <a href="{{ url_for('report.sales') }}" class="btn btn-outline-success">查看报表</a>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-cart-plus display-4 text-warning"></i>
                <h5 class="mt-3">采购报表</h5>
                <p class="text-muted">采购金额、供应商统计</p>
                <a href="{{ url_for('report.purchase') }}" class="btn btn-outline-warning">查看报表</a>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-currency-yen display-4 text-info"></i>
                <h5 class="mt-3">财务报表</h5>
                <p class="text-muted">收支、利润统计</p>
                <a href="{{ url_for('report.finance') }}" class="btn btn-outline-info">查看报表</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
